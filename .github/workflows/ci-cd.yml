name: CI/CD Pipeline

on:
  push:
    branches:
      - main      # triggers prod deploy
      - develop   # triggers dev deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ── 1. Backend Tests ──────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Fix gradlew permissions
        run: chmod +x backend/gradlew
      - name: Run backend tests
        run: |
          cd backend
          ./gradlew test --no-daemon

  # ── 2. Frontend Build & Test ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ── 3. Build & Push Docker Images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=stable" >> $GITHUB_OUTPUT
            echo "extra_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "extra_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.tag }} \
                       -t ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.extra_tag }} \
                       ./backend
          docker push ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.extra_tag }}

      - name: Build & push frontend image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.tag }} \
                       -t ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.extra_tag }} \
                       ./frontend
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.extra_tag }}

  # ── 4. Deploy to Dev (develop branch) ────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to dev namespace
        run: |
          kubectl apply -f k8s/namespaces/dev.yaml
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/backend -n dev --timeout=120s
          kubectl rollout status deployment/frontend -n dev --timeout=120s

  # ── 5. Deploy to Prod (main branch) ──────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to prod namespace
        run: |
          kubectl apply -f k8s/namespaces/prod.yaml
          kubectl apply -f k8s/prod/backend/
          kubectl apply -f k8s/prod/frontend/
          kubectl apply -f k8s/prod/ingress.yaml
          kubectl rollout status deployment/backend -n prod --timeout=180s
          kubectl rollout status deployment/frontend -n prod --timeout=180s
