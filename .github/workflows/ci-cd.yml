name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_PREFIX="ghcr.io/${OWNER}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=stable" >> $GITHUB_OUTPUT
            echo "extra_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "extra_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "image_prefix=${IMAGE_PREFIX}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          docker build -t ${{ steps.meta.outputs.image_prefix }}/backend:${{ steps.meta.outputs.tag }} \
                       -t ${{ steps.meta.outputs.image_prefix }}/backend:${{ steps.meta.outputs.extra_tag }} \
                       ./backend
          docker push ${{ steps.meta.outputs.image_prefix }}/backend:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image_prefix }}/backend:${{ steps.meta.outputs.extra_tag }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ steps.meta.outputs.image_prefix }}/frontend:${{ steps.meta.outputs.tag }} \
                       -t ${{ steps.meta.outputs.image_prefix }}/frontend:${{ steps.meta.outputs.extra_tag }} \
                       ./frontend
          docker push ${{ steps.meta.outputs.image_prefix }}/frontend:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image_prefix }}/frontend:${{ steps.meta.outputs.extra_tag }}

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to dev namespace
        run: |
          kubectl apply -f k8s/namespaces/dev.yaml
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/backend -n dev --timeout=120s
          kubectl rollout status deployment/frontend -n dev --timeout=120s

  deploy-prod:
    name: Deploy to Prod
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to prod namespace
        run: |
          kubectl apply -f k8s/namespaces/prod.yaml
          kubectl apply -f k8s/prod/backend/
          kubectl apply -f k8s/prod/frontend/
          kubectl apply -f k8s/prod/ingress.yaml
          kubectl rollout status deployment/backend -n prod --timeout=180s
          kubectl rollout status deployment/frontend -n prod --timeout=180s
